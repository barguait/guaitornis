<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guaitornis — Registro fotográfico de aves</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Piazzolla:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:      #171912;
    --card:       #1F221A;
    --ink:        #EAE6DA;
    --ink-soft:   #B7B3A4;
    --moss:       #9CB08C;
    --clay:       #D3A467;
    --rust:       #C97F5E;
    --line:       rgba(234,230,218,0.14);
    --line-soft:  rgba(234,230,218,0.08);
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
  }

  body{
    padding: 3rem 1.5rem 4rem;
  }

  .wrap{
    max-width: 1100px;
    margin: 0 auto;
  }

  /* ---------- Header ---------- */

  .site-header{
    margin-bottom: 2.5rem;
  }

  .wordmark-row{
    display:flex;
    align-items:center;
    gap: 0.75rem;
  }

  .brand-icon{
    width: 34px;
    height: 22px;
    color: var(--rust);
    flex-shrink:0;
  }

  h1.wordmark{
    font-family:'Piazzolla', serif;
    font-weight: 600;
    font-size: clamp(2.1rem, 5vw, 2.75rem);
    letter-spacing: 0.01em;
    margin: 0;
    color: var(--ink);
  }

  .subtitle{
    font-family:'Work Sans', sans-serif;
    font-size: 0.98rem;
    color: var(--ink-soft);
    margin: 0.5rem 0 0 2.9rem;
  }

  .rule-double{
    margin-top: 1.75rem;
    height: 5px;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }

  .eyebrow{
    margin: 1.1rem 0 0;
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--moss);
  }

  /* ---------- Grid ---------- */

  .grid{
    margin-top: 1.75rem;
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 1.75rem;
  }

  .card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
    display:flex;
    flex-direction:column;
    transition: border-color 0.2s ease, transform 0.2s ease;
  }

  .card:hover{
    border-color: var(--rust);
    transform: translateY(-2px);
  }

  .card-photo{
    position:relative;
    aspect-ratio: 4 / 3;
    display:flex;
    align-items:center;
    justify-content:center;
    background: var(--tint, #23261D);
    border-bottom: 1px solid var(--line);
  }

  .card:nth-child(3n+1) .card-photo{ --tint: #23261D; }
  .card:nth-child(3n+2) .card-photo{ --tint: #262319; }
  .card:nth-child(3n)   .card-photo{ --tint: #211F1B; }

  .catalog-tag{
    position:absolute;
    top: 10px;
    left: 10px;
    z-index: 2;
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    background: rgba(23,25,18,0.75);
    padding: 2px 7px;
    border: 1px solid var(--line);
    border-radius: 3px;
  }

  .card-photo.has-photo{
    background: #000;
  }

  .card-photo img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .bird-icon-placeholder{
    width: 64px;
    height: 40px;
    color: var(--ink);
    opacity: 0.22;
  }

  .placeholder-label{
    position:absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    opacity: 0.6;
  }

  .card-body{
    padding: 1.1rem 1.15rem 1.3rem;
    display:flex;
    flex-direction:column;
    gap: 0.35rem;
  }

  .local-name{
    font-family:'Piazzolla', serif;
    font-weight: 600;
    font-size: 1.3rem;
    margin: 0;
    color: var(--ink);
  }

  .scientific-name{
    font-family:'IBM Plex Mono', monospace;
    font-style: italic;
    font-size: 0.82rem;
    color: var(--clay);
    margin: 0;
  }

  .capture-date{
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.03em;
    color: var(--ink-soft);
    margin: 0.15rem 0 0.45rem;
  }

  .description{
    font-size: 0.9rem;
    line-height: 1.55;
    color: var(--ink-soft);
    margin: 0;
  }

  .empty-state{
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    color: var(--ink-soft);
  }

  /* ---------- Footer ---------- */

  footer{
    margin-top: 3.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--line);
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--ink-soft);
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap: 0.5rem;
  }

  @media (max-width: 480px){
    body{ padding: 2rem 1.1rem 3rem; }
    .subtitle{ margin-left: 0; margin-top: 0.65rem; }
    .grid{ grid-template-columns: 1fr; }
  }

  @media (prefers-reduced-motion: reduce){
    .card{ transition:none; }
  }

  a{ color: var(--moss); }
  :focus-visible{ outline: 2px solid var(--moss); outline-offset: 2px; }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <symbol id="bird-icon" viewBox="0 0 100 60">
    <path d="M5 40 Q 25 5, 50 25 Q 75 5, 95 40" stroke="currentColor" stroke-width="6" fill="none" stroke-linecap="round"/>
  </symbol>
</svg>

<div class="wrap">

  <header class="site-header">
    <div class="wordmark-row">
      <svg class="brand-icon" viewBox="0 0 100 60"><use href="#bird-icon"/></svg>
      <h1 class="wordmark">Guaitornis</h1>
    </div>
    <p class="subtitle">Registro fotográfico de aves silvestres — Federico Barreiro</p>
    <div class="rule-double"></div>
    <p class="eyebrow">Registro de campo · <span class="count">0</span> especies</p>
  </header>

  <main>
    <div class="grid" id="grid"></div>
  </main>

  <footer>
    <span>© 2026 Federico Barreiro. Todas las fotografías son propias.</span>
    <span>Guaitornis</span>
  </footer>

</div>

<script>
  const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  function formatFecha(iso){
    if(!iso) return '';
    const [y, m, d] = iso.split('-').map(Number);
    if(!y || !m || !d) return iso;
    return `${d} de ${MESES[m - 1]} de ${y}`;
  }

  function crearTarjeta(ave, index){
    const card = document.createElement('article');
    card.className = 'card';

    const photo = document.createElement('div');
    photo.className = 'card-photo' + (ave.foto ? ' has-photo' : '');

    const tag = document.createElement('span');
    tag.className = 'catalog-tag';
    tag.textContent = 'GTN-' + String(index + 1).padStart(3, '0');
    photo.appendChild(tag);

    if(ave.foto){
      const img = document.createElement('img');
      img.src = ave.foto;
      img.alt = ave.nombre_local || 'Ave fotografiada';
      img.loading = 'lazy';
      photo.appendChild(img);
    } else {
      const icon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      icon.setAttribute('class', 'bird-icon-placeholder');
      icon.setAttribute('viewBox', '0 0 100 60');
      icon.innerHTML = '<use href="#bird-icon"></use>';
      photo.appendChild(icon);

      const label = document.createElement('span');
      label.className = 'placeholder-label';
      label.textContent = 'Foto pendiente';
      photo.appendChild(label);
    }

    const body = document.createElement('div');
    body.className = 'card-body';

    const name = document.createElement('h2');
    name.className = 'local-name';
    name.textContent = ave.nombre_local || 'Sin nombre';
    body.appendChild(name);

    const sci = document.createElement('p');
    sci.className = 'scientific-name';
    sci.textContent = ave.nombre_cientifico || '';
    body.appendChild(sci);

    const dateP = document.createElement('p');
    dateP.className = 'capture-date';
    const time = document.createElement('time');
    if(ave.fecha){
      time.setAttribute('datetime', ave.fecha);
      time.textContent = formatFecha(ave.fecha);
    }
    dateP.appendChild(time);
    body.appendChild(dateP);

    const desc = document.createElement('p');
    desc.className = 'description';
    desc.textContent = ave.descripcion || '';
    body.appendChild(desc);

    card.appendChild(photo);
    card.appendChild(body);
    return card;
  }

  async function cargarAves(){
    const grid = document.getElementById('grid');
    try{
      const res = await fetch('content/aves.json', { cache: 'no-store' });
      if(!res.ok) throw new Error('No se encontró content/aves.json');
      const data = await res.json();
      const especies = Array.isArray(data.especies) ? data.especies : [];

      grid.innerHTML = '';

      if(especies.length === 0){
        const empty = document.createElement('p');
        empty.className = 'empty-state';
        empty.textContent = 'Todavía no hay especies cargadas. Agregá la primera desde /admin.';
        grid.appendChild(empty);
      } else {
        especies.forEach((ave, i) => grid.appendChild(crearTarjeta(ave, i)));
      }

      document.querySelector('.count').textContent = especies.length;
    } catch(err){
      grid.innerHTML = '<p class="empty-state">No se pudo cargar el catálogo de aves.</p>';
      console.error(err);
    }
  }

  cargarAves();
</script>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  if(window.netlifyIdentity){
    window.netlifyIdentity.on('init', user => {
      if(!user){
        window.netlifyIdentity.on('login', () => {
          document.location.href = '/admin/';
        });
      }
    });
  }
</script>

</body>
</html>
